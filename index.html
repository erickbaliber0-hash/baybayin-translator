<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baybayin Translator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  background: #0f0f0f;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 350px;
  padding: 25px;
  border-radius: 16px;
  background: #1c1c1e;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.icon {
  font-size: 60px;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #b0b0b0;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff3b30;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

.footer {
  margin-top: 15px;
  font-size: 11px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
  <div class="icon">⚠️</div>

  <h1>App No Longer Available</h1>

  <p>
    Baybayin Translator is no longer supported.<br>
    Please uninstall the app or visit our website for more information.
  </p>

  <button onclick="exitApp()">Exit App</button>

  <div class="footer">
    Version 2.0 • Service Ended
  </div>
</div>

<script>
function exitApp() {
  // For Android WebView / APK
  if (navigator.app) {
    navigator.app.exitApp();
  } else if (window.close) {
    window.close();
  } else {
    alert("You can now close the app.");
  }
}
</script>

</body>
  </html>

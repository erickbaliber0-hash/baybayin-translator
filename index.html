<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baybayin Translator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Sans+Tagalog&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Poppins,sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#4f46e5,#9333ea);
display:flex;justify-content:center;align-items:center;
padding:20px;color:#fff;overflow:hidden}
.glow{position:fixed;border-radius:50%;filter:blur(120px);z-index:-1}
.g1{width:260px;height:260px;background:#a855f7;top:-50px;left:-50px}
.g2{width:300px;height:300px;background:#3b82f6;bottom:-80px;right:-80px}
.app{
width:420px;max-width:100%;
background:rgba(255,255,255,.12);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.18);
border-radius:32px;padding:22px}
.header{text-align:center;margin-bottom:15px}
.logo{font-size:38px}
textarea{
width:100%;height:140px;border:none;outline:none;
border-radius:22px;padding:16px;
background:rgba(255,255,255,.1);color:white}
.buttons{display:flex;gap:10px;margin-top:10px}
button{
flex:1;border:none;border-radius:999px;
padding:14px;cursor:pointer;font-weight:600}
.translate{background:#7c3aed;color:white}
.copy{background:#22c55e;color:white}
.clear{background:#ef4444;color:white}
.output{
margin-top:15px;min-height:120px;
background:rgba(255,255,255,.08);
border-radius:22px;padding:16px}
.baybayin{font-family:"Noto Sans Tagalog";font-size:30px;text-align:center}
.nav{display:flex;justify-content:space-around;margin-top:18px;font-size:13px;opacity:.9}
.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#111;padding:10px 18px;border-radius:999px;
display:none}
 
 .footer{
  text-align:center;
  margin-top:20px;
  font-size:13px;
  opacity:.9;
}

.creator{
  color:#38bdf8;
  font-weight:600;
  text-decoration:none;
  transition:.3s;
}

.creator:hover{
  color:#ffffff;
}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="app">
<div class="header">
<div class="logo">ᜊᜌ᜔ᜊᜌᜒᜈ᜔</div>
<h2>Baybayin Translator</h2>
<p>Filipino → Baybayin</p>
</div>

<textarea id="inputText" placeholder="Type Filipino text..." oninput="translateText()"></textarea>

<div class="buttons">
<button class="translate" onclick="translateText()">Translate</button>
<button class="copy" onclick="copyText()">Copy</button>
<button class="clear" onclick="clearText()">Clear</button>
</div>

<div class="output">
<div id="outputText" class="baybayin">ᜋᜄᜈ᜔ᜇᜅ᜔ ᜀᜇᜏ</div>
</div>
 <div class="footer">
  Developed by
  <a href="https://www.facebook.com/BaliberErick" target="_blank" class="creator">
    👨‍💻 Erick Baliber
  </a>
</div>
 

<div id="toast" class="toast"></div>

<script>
const map={a:"ᜀ",b:"ᜊ",k:"ᜃ",d:"ᜇ",e:"ᜁ",g:"ᜄ",h:"ᜑ",i:"ᜁ",l:"ᜎ",m:"ᜋ",n:"ᜈ",o:"ᜂ",p:"ᜉ",r:"ᜇ",s:"ᜐ",t:"ᜆ",u:"ᜂ",w:"ᜏ",y:"ᜌ"};
const historyList=[];

function translateText(){
 let input=document.getElementById("inputText").value.toLowerCase();
 let output="";
 for(let c of input){ output += map[c] || c; }
 document.getElementById("outputText").textContent=output;
 if(input.trim()) historyList.push({input,output,time:Date.now()});
}
function clearText(){
 document.getElementById("inputText").value="";
 document.getElementById("outputText").textContent="";
 toast("Cleared");
}
function copyText(){
 navigator.clipboard.writeText(document.getElementById("outputText").textContent);
 toast("Copied");
}
function toast(msg){
 const t=document.getElementById("toast");
 t.textContent=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",1800);
}
</script>
</body>
</html>

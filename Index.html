<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baybayin Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Tagalog&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3a8a,#9333ea);
}

.phone{

width:370px;
height:740px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

border-radius:30px;
padding:25px;

color:white;

box-shadow:0 25px 60px rgba(0,0,0,0.5);

display:flex;
flex-direction:column;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
font-size:22px;
font-weight:600;
}

.header p{
font-size:12px;
opacity:.7;
}

.inputBox{

margin-top:15px;
}

textarea{

width:100%;
height:130px;

border:none;
border-radius:15px;

padding:15px;

font-size:15px;
font-family:Poppins;

outline:none;
resize:none;

background:rgba(255,255,255,0.1);
color:white;
}

textarea::placeholder{
color:#d1d5db;
}

.buttons{

display:flex;
gap:10px;
margin-top:10px;
}

button{

flex:1;
padding:10px;

border:none;
border-radius:10px;

font-weight:500;

cursor:pointer;

}

.clear{

background:#ef4444;
color:white;
}

.copy{

background:#22c55e;
color:white;
}

.output{

margin-top:20px;

flex:1;

background:rgba(0,0,0,0.25);

border-radius:15px;

padding:15px;

}

.output h3{
font-size:14px;
margin-bottom:10px;
opacity:.8;
}

.baybayin{

font-family:"Noto Sans Tagalog";

font-size:40px;

line-height:1.6;

word-wrap:break-word;

}

.footer{

text-align:center;

font-size:11px;

margin-top:10px;

opacity:.6;

}

</style>
</head>

<body>

<div class="phone">

<div class="header">

<h1>Baybayin Translator</h1>
<p>Latin → Ancient Filipino Script</p>

</div>

<div class="inputBox">

<textarea
id="inputText"
placeholder="Type Filipino text..."
oninput="translateText()"
></textarea>

<div class="buttons">

<button class="clear" onclick="clearText()">Clear</button>

<button class="copy" onclick="copyText()">Copy</button>

</div>

</div>

<div class="output">

<h3>Baybayin Output</h3>

<div id="outputText" class="baybayin"></div>

</div>

<div class="footer">

Ancient Filipino Writing System

</div>

</div>

<script>

const map = {

a:"ᜀ",
b:"ᜊ",
k:"ᜃ",
d:"ᜇ",
e:"ᜁ",
g:"ᜄ",
h:"ᜑ",
i:"ᜁ",
l:"ᜎ",
m:"ᜋ",
n:"ᜈ",
o:"ᜂ",
p:"ᜉ",
r:"ᜇ",
s:"ᜐ",
t:"ᜆ",
u:"ᜂ",
w:"ᜏ",
y:"ᜌ"

};

function translateText(){

let input=document.getElementById("inputText").value.toLowerCase();

let output="";

for(let char of input){

if(map[char]){

output+=map[char];

}else{

output+=char;

}

}

document.getElementById("outputText").textContent=output;

}

function clearText(){

document.getElementById("inputText").value="";
document.getElementById("outputText").textContent="";

}

function copyText(){

let text=document.getElementById("outputText").textContent;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
